  {name:'飞利浦FC8776',price:3499,brand:'飞利浦',type:'头部',func:'自动集尘',attrs:{导航方式:'LDS',材质:'ABS+金属',水箱:'0.18L',尘盒:'0.32L',噪音:'65dB',避障:'红外',自动集尘:'是',自动洗拖:'否',烘干:'否'}},
  {name:'浦桑尼克M8Pro',price:1299,brand:'浦桑尼克',type:'白牌',func:'单机',attrs:{导航方式:'视觉',材质:'ABS',水箱:'0.08L',尘盒:'0.16L',噪音:'74dB',避障:'视觉',自动集尘:'否',自动洗拖:'否',烘干:'否'}},
  {name:'京东京造Z9',price:999,brand:'京造',type:'白牌',func:'单机',attrs:{导航方式:'视觉',材质:'ABS',水箱:'0.06L',尘盒:'0.14L',噪音:'76dB',避障:'视觉',自动集尘:'否',自动洗拖:'否',烘干:'否'}},
];
const PRICE_BANDS = ['<1.5K','1.5K-3K','3K-5K','>5K'];
const BRAND_TYPES = ['头部','高潜','白牌'];
const FUNCS = ['单机','自动集尘','全能基站'];
const NAV = ['视觉','LDS','LDS+视觉','结构光'];
const PET = ['宠物款','非宠物'];
const DATA_DIMS = ['价格带','品牌类型','功能类型','导航方式'];  // 有逐品数据、可下钻匹配的维度
const CHANNELS = ['京东自营','京东POP','天猫','抖音'];
const SHOP_TYPES = ['旗舰店','专卖店','专营店','京东自营店'];
const BIZ_MODES = ['自营','POP 第三方','厂直','经销代理'];
const STD_BRANDS = ['科沃斯','追觅','石头','云鲸','小米','添可','海尔','美的','睿米','Shark','松下','飞利浦','浦桑尼克','由利','京造'];
const METRICS_F = ['GMV','销量','增速','动销率','客单价'];
const DEPT_TREE = {'家电事业群':{'大家电':['冰洗空','影音电视','厨卫大电'],'生活电器':['清洁电器','个护健康','环境电器'],'厨房电器':['烹饪电器','水料电器']},'3C事业群':{'手机通讯':['手机','智能配件'],'电脑办公':['笔记本','外设']}};
const CAT_TREE = {'清洁电器':{'扫地机器人':['全能基站','自动集尘','单机'],'洗地机':['无线洗地机','有线洗地机'],'吸尘器':['手持','立式']},'个护健康':{'剃须刀':['电动','手动']},'环境电器':{'空气净化器':['家用','车载']}};
const TIME_DIMS = ['近30天','近90天','近半年','近一年'];
const CAT_LEVELS = {'一级':['清洁电器'],'二级':['扫地机','洗地机','吸尘器','蒸汽拖把'],'三级':['全能基站扫地机','自动集尘扫地机','单机扫地机','无线洗地机','有线洗地机','手持吸尘器','立式吸尘器','桶式吸尘器','蒸汽拖把']};

const STEP_NAMES = ['货盘圈选','属性推荐','指标选择','网格绘制与调优','网格诊断'];
const GRID_DIMS = ['价格带','品牌类型','功能类型','品类'];

const ATTR_DIMS = ['避障','材质','烘干'];
const attrDimVals = dim => [...new Set(SKUS.map(s=>s.attrs&&s.attrs[dim]).filter(Boolean))];
const dimVals = (dim,catLevel,selMap) => {
  const all = dim==='价格带'?PRICE_BANDS : dim==='品牌类型'?BRAND_TYPES : dim==='功能类型'?FUNCS : dim==='导航方式'?NAV : dim==='宠物功能'?PET : dim==='品类'?CAT_LEVELS[catLevel||'二级'] : ATTR_DIMS.includes(dim)?attrDimVals(dim) : [];
  if(selMap && selMap[dim] && selMap[dim].length) return all.filter(v=>selMap[dim].includes(v));
  return all;
};
const combos = (dims,catLevel,selMap) => {
  if(!dims||!dims.length) return [{label:'全部',parts:[]}];
  let acc=[{label:'',parts:[]}];
  dims.forEach(dim=>{ const vs=dimVals(dim,catLevel,selMap); const nx=[]; acc.forEach(a=>vs.forEach(v=>nx.push({label:a.label?a.label+' · '+v:v, parts:[...a.parts,{dim,val:v}]}))); acc=nx; });
  return acc;
};
const computeGrid = (rowDims,colDims,catLevel,selMap) => {
  const rows=combos(rowDims,catLevel,selMap), cols=combos(colDims,catLevel,selMap);
  return {rows,cols,cells:rows.map(r=>cols.map(c=>{
    const seed=(r.label+'|'+c.label).split('').reduce((a,b)=>a+b.charCodeAt(0),0);
    return {scale:Math.round((seed%500+100)*10)/10, growth:Math.round(seed%60-15), share:Math.round((seed%40+10)*10)/10, sku:seed%9+1};
  }))};
};
const cellColor = d => d<0 ? 'bg-negbg border-[#f6d3d3]' : 'bg-white border-[#ececee]';

// ---- cell drill-down helpers ----
const bandOf = p => p<1500?'<1.5K':p<3000?'1.5K-3K':p<5000?'3K-5K':'>5K';
const skuVal = (s,dim,fix) => { const f=fix&&fix[s.name]; if(f&&f[dim]!=null) return f[dim]; return dim==='价格带'?bandOf(s.price):dim==='品牌类型'?s.type:dim==='功能类型'?s.func:(s.attrs&&s.attrs[dim]!=null?s.attrs[dim]:'__ALL__'); };
const partMatch = (s,parts,fix) => parts.every(p=>{ const v=skuVal(s,p.dim,fix); return v==='__ALL__'?true:v===p.val; });
const cellSkus = (rowParts,colParts,fix) => SKUS.filter(s=>partMatch(s,rowParts,fix)&&partMatch(s,colParts,fix));
const skuStat=s=>{const seed=s.name.split('').reduce((a,c)=>a+c.charCodeAt(0),0);const sales=seed%400+80;const lowConfAttrs={};if(s.attrs){Object.entries(s.attrs).forEach(([k,v])=>{const aseed=(k+v).split('').reduce((a,c)=>a+c.charCodeAt(0),0);if(aseed%5===0) lowConfAttrs[k]={val:v,conf:aseed%40+25};});}return {sales,gmv:+(s.price*sales/10000).toFixed(1),channel:CHANNELS[seed%4],lowConfAttrs};};

/* =================== SHARED CHAT PIECES =================== */
const Agent = ({children,ts}) => (
  <div className="flex gap-2.5 mb-4 fade max-w-[92%]">

    <div>
      <div className="text-[11px] text-ink2 mb-1">供应链 Agent{ts?<span className="ml-2">{ts}</span>:''}</div>
      <div className="bg-white border border-[#e8e6f0] rounded-[18px] rounded-tl-md px-4 py-3 text-[13.5px] leading-relaxed shadow-[0_8px_26px_rgba(20,22,40,0.06)]">{children}</div>
    </div>
  </div>
);
const User = ({children}) => (
  <div className="flex gap-2.5 mb-4 fade max-w-[92%] ml-auto flex-row-reverse">
    <div className="w-7 h-7 rounded-full shrink-0 bg-[#ece2ff] flex items-center justify-center text-[11px] font-bold text-brand-700">我</div>
    <div className="bg-brand-50 text-ink rounded-[18px] rounded-tr-md px-4 py-2.5 text-[13.5px] leading-relaxed border border-brand-100">{children}</div>
  </div>
);
const Capture = ({code,children}) => (
  <div className="flex gap-2.5 mb-4 fade max-w-[92%]">
    <div className="w-7 shrink-0"></div>
    <div className="bg-[#fafafa] border border-[#ececee] rounded-xl px-4 py-3 w-full">
      <div className="text-[11px] font-semibold text-ink2 mb-1 flex items-center gap-1.5">
        <svg className="w-3.5 h-3.5 text-brand-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.8} d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3-7 3V5z"/></svg>
        已捕获偏好，沉淀至 ERP 策略中心
      </div>
      <div className="text-[12.5px] text-[#333] leading-relaxed">{children}</div>
      <div className="mt-1.5 text-[11px]"><span className="font-mono bg-brand-50 text-brand-700 px-1.5 py-0.5 rounded">{code}</span></div>
    </div>
  </div>
);
const ConfirmBar = ({label,onConfirm,done}) => done ? (
  <div className="mt-3 pt-2.5 border-t border-slate-100 flex items-center gap-1.5 text-[12px] text-emerald-600 font-bold">
    <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M5 13l4 4L19 7"/></svg>已确认
  </div>
) : (
  <div className="mt-3 pt-2.5 border-t border-slate-100">
    <button onClick={onConfirm} className="px-5 py-2 rounded-full bg-brand-50 border border-brand-200 hover:bg-brand-100 text-brand-600 text-[12.5px] font-semibold transition-all">{label}</button>
  </div>
);
const chip = (on)=>`text-[11.5px] px-2.5 py-1 rounded-full border transition-all cursor-pointer ${on?'bg-brand-50 border-brand-300 text-brand-700 font-bold':'bg-white border-slate-200 text-slate-500 hover:border-slate-300'}`;

/* =================== STEP CHAT CONTROLS =================== */
// each returns interactive controls that live INSIDE an agent bubble; edits App state
const S1 = ({st,set,done,onConfirm,embed}) => {
  const s1=st.s1||{};
  const up = patch => set({s1:{...s1,...patch}});
  const arrTog = (key,v) => { const a=s1[key]||[]; up({[key]: a.includes(v)?a.filter(x=>x!==v):[...a,v]}); };
  const cc = on => `text-[11px] px-2 py-0.5 rounded-full border cursor-pointer transition-all ${on?'bg-brand-50 border-brand-300 text-brand-700 font-semibold':'bg-white border-[#e0e0e0] text-ink2 hover:border-brand-300'}`;
  const chips = (key,vals) => <div className="flex flex-wrap gap-1.5">{vals.map(v=><span key={v} onClick={()=>!done&&arrTog(key,v)} className={cc((s1[key]||[]).includes(v))}>{v}</span>)}</div>;
  const sw = (onKey) => <button disabled={done} onClick={()=>up({[onKey]:!s1[onKey]})} className={`w-8 h-[18px] rounded-full relative transition-colors shrink-0 ${s1[onKey]?'bg-brand-500':'bg-[#e0e0e0]'}`}><span className={`absolute top-0.5 w-3.5 h-3.5 rounded-full bg-white transition-all ${s1[onKey]?'left-[15px]':'left-0.5'}`}/></button>;
  const sec = (onKey,title,body) => (
    <div className={`rounded-lg border p-2.5 ${s1[onKey]?'border-brand-200 bg-brand-50/20':'border-[#ececee]'}`}>
      <div className="flex items-center gap-2"><span className={`text-[12px] font-semibold flex-1 ${s1[onKey]?'text-ink':'text-ink2'}`}>{title}</span>{sw(onKey)}</div>
      {s1[onKey] && <div className="mt-2">{body}</div>}
    </div>
  );
  return (<div className="space-y-2">
    <div className="text-[12px] text-slate-500">按需勾选、任意组合以下条件（命中商品取并集）：</div>
    {sec('chanOn','① 分析渠道', chips('chans',CHANNELS))}
    {sec('attrOn','② 店铺类型 / 经营模式 / 品牌类型',
      <div className="space-y-2">
        <div><div className="text-[10px] text-ink2 mb-1">店铺类型</div>{chips('shopTypes',SHOP_TYPES)}</div>
        <div><div className="text-[10px] text-ink2 mb-1">经营模式</div>{chips('bizModes',BIZ_MODES)}</div>
        <div><div className="text-[10px] text-ink2 mb-1">品牌类型</div>{chips('brandTypes',BRAND_TYPES)}</div>
      </div>)}
    {sec('brandOn','③ 标准品牌', <div className="max-h-24 overflow-y-auto cs">{chips('brands',STD_BRANDS)}</div>)}

const stepSummary = (s, st) => {
  switch(s){

    case 1: return st.s2dims.filter(d=>d.on).map(d=>d.name).join(' × ')||'未选维度';
    case 2: return st.s4metrics.filter(m=>m.on).map(m=>m.name).join(' / ');

    <div className="w-full h-full grid transition-all duration-300 bg-[#f6f6f8] p-3 gap-3" style={{gridTemplateColumns: gridCols}}>

      {/* ===== LEFT (light) ===== */}
      <aside className="bg-white border border-[#e4e2ee] rounded-xl flex flex-col overflow-hidden shadow-[0_10px_30px_rgba(20,22,40,0.06)]">
        <div className="px-5 py-5 flex items-center gap-3">
          <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-brand-500 via-brand-400 to-[#4ed6c5] flex items-center justify-center text-white text-[14px] font-black shadow-[0_8px_22px_rgba(124,77,255,0.2)]">AI</div>
          <div><div className="text-[14px] font-semibold leading-tight">供应链 Agent</div><div className="text-[11px] text-ink2">Category Intelligence</div></div>
        </div>
        <div className="mx-4 mb-3 grid grid-cols-2 rounded-lg bg-[#f4f4f7] p-1"><button className="py-2 rounded-md text-[13px] font-semibold text-ink2 hover:text-ink">报告</button><button className="py-2 rounded-md bg-white text-[13px] font-semibold text-brand-600 shadow-sm">对话</button></div><button onClick={()=>setScreen('home')} className="mx-4 py-2.5 rounded-lg bg-gradient-to-r from-brand-50 to-[#f3fbfa] border border-brand-100 hover:border-brand-300 text-brand-600 text-[13px] font-semibold flex items-center justify-start px-4 gap-2 transition-all">＋ 新建任务</button>
        <div className="flex-1 overflow-y-auto cs px-2.5 pb-3">
          <div className="text-[10px] font-semibold tracking-wider text-ink2 px-2 pt-4 pb-1.5">能力</div>
          {[
            ['专家技能',6,'M9.663 17h4.673M12 3a6 6 0 00-3.75 10.687c.37.29.6.72.6 1.19V16h6.3v-1.123c0-.47.23-.9.6-1.19A6 6 0 0012 3z'],
            ['插件',4,'M11 4a2 2 0 114 0v1a1 1 0 001 1h3a1 1 0 011 1v3a1 1 0 01-1 1h-1a2 2 0 100 4h1a1 1 0 011 1v3a1 1 0 01-1 1h-3a1 1 0 01-1-1v-1a2 2 0 10-4 0v1a1 1 0 01-1 1H7a1 1 0 01-1-1v-3a1 1 0 00-1-1H4a2 2 0 110-4h1a1 1 0 001-1V7a1 1 0 011-1h3a1 1 0 001-1V4z'],
            ['知识库',12,'M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.746 0 3.332.477 4.5 1.253v13C19.832 18.477 18.246 18 16.5 18c-1.746 0-3.332.477-4.5 1.253'],
            ['记忆',28,'M4 7c0 1.657 3.582 3 8 3s8-1.343 8-3-3.582-3-8-3-8 1.343-8 3zM4 7v10c0 1.657 3.582 3 8 3s8-1.343 8-3V7'],
            ['自动化任务',3,'M13 10V3L4 14h7v7l9-11h-7z'],
          ].map(x=>(
            <div key={x[0]} role={x[0]==='插件'?'button':undefined} tabIndex={x[0]==='插件'?0:undefined} onClick={()=>{if(x[0]==='插件')setScreen('home');}} onKeyDown={e=>{if(x[0]==='插件'&&(e.key==='Enter'||e.key===' ')){e.preventDefault();setScreen('home');}}} className={`flex items-center gap-2.5 px-2.5 py-2 rounded-xl hover:bg-[#f4f6ff] cursor-pointer text-[13px] ${x[0]==='插件'&&screen==='home'?'bg-brand-50 text-brand-600 font-semibold':'text-[#333]'}`}>
              <svg className={`w-4 h-4 shrink-0 ${x[0]==='插件'&&screen==='home'?'text-brand-600':'text-ink2'}`} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.6} d={x[2]}/></svg>
              {x[0]}<span className="ml-auto text-[10px] font-semibold text-[#b0b0b5]">{x[1]}</span>
            </div>
          ))}
          <div className="text-[10px] font-semibold tracking-wider text-ink2 px-2 pt-4 pb-1.5">正在执行</div>
          {screen!=='tool'
            ? <div className="px-2.5 py-3 rounded-xl border border-dashed border-[#e0e0e0] text-[11px] text-ink2 text-center mb-1.5">暂无进行中的分析<br/>从插件中心开始</div>
            : <div className="p-2.5 rounded-xl bg-brand-50 border border-brand-200 mb-1.5">
                <div className="flex items-center gap-2"><span className={`w-2 h-2 rounded-full ${!started?'bg-[#c7c7cc]':'bg-[#34c759] pulse'}`}/><span className="text-[13px] font-semibold">品类网格拆解 · {catLabel}</span></div>
                <div className="text-[11px] text-ink2 ml-4 mt-1">{!started?'默认网格 · 待配置':finished?'已完成 · 策略已沉淀':fromTemplate?`模板配置 · ${fromTemplate}`:'自定义配置中'}</div>
                <div className="ml-4 mt-2 h-1 rounded-full bg-[#e8e8ed] overflow-hidden"><div className="h-full bg-[#7c4dff] transition-all" style={{width:(!started?0:finished?100:55)+'%'}}/></div>
              </div>}
          <div className="text-[10px] font-semibold tracking-wider text-ink2 px-2 pt-4 pb-1.5">历史分析</div>
          {history.length===0
            ? <div className="px-2.5 py-3 rounded-xl border border-dashed border-[#e0e0e0] text-[11px] text-ink2 text-center mb-1.5">暂无历史<br/>完成后点「保存本次分析」</div>
            : history.map(r=>(
              <div key={r.id} role="button" tabIndex={0} onClick={()=>restoreRecord(r)} onKeyDown={e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();restoreRecord(r);}}} className="p-2.5 rounded-xl hover:bg-[#f4f6ff] cursor-pointer mb-1">
                <div className="flex items-center gap-2"><span className="w-2 h-2 rounded-full bg-[#c7c7cc]"/><span className="text-[13px] font-semibold text-[#333] truncate">{r.catLabel}</span></div>
                <div className="text-[11px] text-ink2 ml-4 mt-0.5 truncate">{(r.rows||[]).join('·')} × {(r.cols||[]).join('·')} · {r.mode} · {r.ts}</div>
              </div>
            ))}
        </div>
        <div className="px-4 py-3 border-t border-[#f0f0f0] flex items-center gap-2.5">
          <div className="w-7 h-7 rounded-full bg-[#e8e8ed] flex items-center justify-center text-[11px] font-bold text-ink2">王</div>
          <div><div className="text-[12px] font-semibold">王晓刚 · 采销</div><div className="text-[11px] text-ink2">大家电工作台</div></div>
        </div>
      </aside>

      {screen==='home' && <main className="overflow-y-auto cs bg-transparent"><HomePage onOpen={()=>setScreen('scope')}/></main>}
      {screen==='scope' && <main className="overflow-y-auto cs bg-transparent"><ScopeSelect scope={scope} setScope={setScope} onBack={()=>setScreen('home')} onConfirm={()=>{coldReset();setScreen('tool');}}/></main>}

      {/* ===== MIDDLE (chat) ===== */}
      {screen==='tool' && (narrow ? (!showViz||mtab==='chat') : true) && (
      <main className="flex flex-col overflow-hidden bg-white border border-[#e8e8ee] rounded-xl shadow-[0_10px_30px_rgba(20,22,40,0.05)]">
        {narrow && showViz && <div className="flex gap-1 px-3 py-2 bg-white border-b border-[#e0e0e0]">
          {[['chat','对话 / 配置'],['grid','网格结果']].map(([k,l])=><button key={k} onClick={()=>setMtab(k)} className={`flex-1 py-1.5 rounded-lg text-[12px] font-semibold transition-all ${mtab===k?'bg-brand-50 text-brand-600':'text-ink2'}`}>{l}</button>)}
        </div>}
        <div className="px-5 py-3 glass border-b border-[#e0e0e0] flex items-center gap-3">
          <div className="min-w-0"><div className="text-[14px] font-semibold truncate">品类网格拆解 · {catLabel}</div><div className="text-[11px] text-ink2 truncate">{scope.dL2} · {scope.timeDim}</div></div>
          <button onClick={()=>setScreen('scope')} className="ml-auto shrink-0 text-[11px] font-semibold text-brand-600 border border-brand-200 bg-brand-50 rounded-full px-2.5 py-1 hover:bg-brand-100 transition-all">↩ 重新选择范围</button>
          <div className={`shrink-0 text-[11px] font-semibold px-2.5 py-1 rounded-full flex items-center gap-1.5 ${!started?'bg-[#f0f0f0] text-ink2':finished?'bg-[#e8f8f0] text-[#34c759]':'bg-brand-50 text-brand-600'}`}><span className={`w-1.5 h-1.5 rounded-full ${!started?'bg-[#c7c7cc]':finished?'bg-[#34c759]':'bg-[#7c4dff] pulse'}`}/>{statusText}</div>
        </div>
        <div ref={chatRef} className="flex-1 overflow-y-auto cs px-5 py-5">
          <ChatBody started={started} beginFlow={beginFlow} applyTemplate={applyTemplate} fromTemplate={fromTemplate} finished={finished} onFinish={onFinish} onReset={coldReset} coldView={coldView} setColdView={setColdView} genInsight={genInsight} insight={insight} insightBusy={insightBusy} stage={stage} confirm={confirm} typing={typing} st={st} set={set} drawing={drawing} onRegen={()=>{setSel(null);runDraw();}} onSaveAnalysis={saveAnalysis}/>
        </div>
        <div className="px-5 py-3 bg-white border-t border-[#e6e6e8]">
          <div className="flex flex-wrap gap-2 mb-2.5">
            <button onClick={coldReset} className="flex items-center gap-1.5 px-3 py-1.5 rounded-full border border-brand-200 bg-brand-50 text-[12px] font-semibold text-brand-600 hover:bg-brand-100 transition-all">
              <LayersIcon cls="w-3.5 h-3.5"/>经验模板库
            </button>
            {['猜你想问','看某个格子的竞品','生成拆解报告'].map(c=>(
              <button key={c} className="flex items-center gap-1.5 px-3 py-1.5 rounded-full border border-[#e6e6e8] bg-white text-[12px] font-medium text-[#333] hover:border-brand-300 hover:text-brand-600 transition-all">
                <svg className="w-3.5 h-3.5 text-brand-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.8} d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.5 6.5L20 12l-6.5 2.5L11 21l-2.5-6.5L2 12l6.5-2.5L11 3z"/></svg>{c}
              </button>
            ))}
          </div>
          <div className="flex items-center gap-2 bg-white border border-[#e0e0e0] rounded-2xl pl-4 pr-2 py-2 shadow-[0_1px_3px_rgba(0,0,0,0.04)]">
            <svg className="w-4 h-4 text-pos shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.8} d="M9 12l2 2 4-4m5-2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            <input placeholder={finished?'分析已完成，可开启新任务…':'看市场、看选品引商和拆解机会，都可以问我哦～'} className="flex-1 bg-transparent text-[13px] outline-none placeholder:text-[#b0b0b5]"/>
            <button className="w-9 h-9 rounded-xl bg-white border border-[#e0e0e0] text-brand-600 flex items-center justify-center hover:bg-brand-50 hover:border-brand-200 transition-all"><svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.8} d="M12 19V5m0 0l-7 7m7-7l7 7" transform="rotate(45 12 12)"/></svg></button>
          </div>
        </div>
      </main>
      )}

      {resizable && (
        <div onMouseDown={startDrag} onDoubleClick={()=>setVizW(430)} title="拖动调整宽度（双击复位）" className="cursor-col-resize flex items-center justify-center hover:bg-brand-50 group">
          <div className="w-[3px] h-9 rounded-full bg-[#e0e0e0] group-hover:bg-brand-400 transition-colors"/>
        </div>
      )}

      {/* ===== RIGHT (viz) ===== */}
      {showViz && (narrow ? mtab==='grid' : true) && (
      <aside className="flex flex-col overflow-hidden bg-white border border-[#e4e2ee] rounded-xl shadow-[0_10px_30px_rgba(20,22,40,0.05)]">
        {narrow && <div className="flex gap-1 px-3 py-2 bg-white border-b border-[#e0e0e0]">
          {[['chat','对话 / 配置'],['grid','网格结果']].map(([k,l])=><button key={k} onClick={()=>setMtab(k)} className={`flex-1 py-1.5 rounded-lg text-[12px] font-semibold transition-all ${mtab===k?'bg-brand-50 text-brand-600':'text-ink2'}`}>{l}</button>)}
        </div>}
        <div className="px-4 py-3 glass border-b border-[#e0e0e0] flex items-center gap-2">
          <span className="text-[14px] font-semibold">可视化结果</span>
          <span className="text-[11px] font-semibold px-2 py-0.5 rounded-full bg-brand-50 text-brand-600">{vizLabel}</span>
          <div className="ml-auto flex items-center gap-1">
            {!narrow && <button onClick={()=>setExpanded(e=>!e)} className={`px-3 h-7 rounded-full border text-[12px] font-semibold flex items-center gap-1 transition-all ${expanded?'bg-brand-50 border-brand-300 text-brand-700':'bg-white border-[#e0e0e0] text-ink2 hover:bg-brand-50 hover:border-brand-200 hover:text-brand-600'}`}>{expanded?'⤡ 退出全屏':'⛶ 全屏'}</button>}
          </div>
        </div>
        <div className="flex-1 overflow-y-auto cs p-4 bg-[#fafafc]">
          {drawing ? (
            <div className="h-full min-h-[280px] flex flex-col items-center justify-center text-center gap-3">
              <div className="w-9 h-9 rounded-full border-[3px] border-[#e0e0e0] border-t-[#7c4dff] spin"/>
              <div className="text-[13px] font-semibold text-ink">网格绘制中…</div>
              <div className="text-[11px] text-ink2">正在按 {(st.s5rows||[]).join('·')} × {(st.s5cols||[]).join('·')} 交叉商品、计算指标</div>
              <button onClick={runDraw} className="mt-1 text-[11px] font-semibold text-brand-600 hover:underline">较慢？点此重试</button>
            </div>
          ) : (<>
            <VizStep s={4} st={st} set={set} big={expanded} sel={sel} onCell={onCell}/>
          </>)}
        </div>
      </aside>
      )}

    </div>

    {/* ===== FULLSCREEN 可视化 ===== */}
    {expanded && showViz && (
      <div className="fixed inset-0 z-50 bg-white flex flex-col fade">
        <div className="px-6 py-3 glass border-b border-[#e0e0e0] flex items-center gap-2">
          <span className="text-[14px] font-semibold">可视化结果</span>
          <span className="text-[11px] font-semibold px-2 py-0.5 rounded-full bg-brand-50 text-brand-600">{vizLabel}</span>
          <button onClick={()=>setExpanded(false)} className="ml-auto px-3 h-8 rounded-full bg-white border border-[#e0e0e0] text-[#333] hover:bg-brand-50 hover:border-brand-200 hover:text-brand-600 text-[12.5px] font-semibold transition-all">⤡ 退出全屏</button>
        </div>
        <div className="flex-1 overflow-y-auto cs p-6 bg-[#fafafc]">
          <VizStep s={4} st={st} set={set} big={true} sel={sel} onCell={onCell}/>
        </div>
      </div>
    )}
   </>
  );
};

const rootNode=document.getElementById('root');
if(rootNode) ReactDOM.createRoot(rootNode).render(<App/>);
</script>
</body>
</html>
